services:
  mongo:
    image: mongo:7
    container_name: nimbus-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: C:\Users\risha\OneDrive\Desktop\project\nimbus-pwa\packages\api
      dockerfile: Dockerfile
    command: node src/server.js
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/nimbus
      - CORS_ORIGIN=https://localhost:5173
      - JWT_SECRET=supersecret_change_me
      - NODE_ENV=development
    ports:
      - "5000:5000"
    depends_on:
      - mongo

volumes:
  mongo_data: